mythicmobs:
  enabled: true
  injector:
    auto-inject-on-startup: false
    auto-inject-on-reload: false
    run-reload-after-inject: true
    reload-command: "mm reload"
    mobs-file: "Bullseye-AutoMobs.yml"
    skills-file: "Bullseye-AutoSkills.yml"
    import-external-examples: true
    external-example-roots:
      - "../Champions/examples/mythicmobs"
      - "G:/Peach Tree Studios Clients/Champions/examples/mythicmobs"
      - "/mnt/g/Peach Tree Studios Clients/Champions/examples/mythicmobs"
  mobs:
    shadow_stalker:
      mythic-mob: ShadowStalker
      spawn-egg-item: shadow_stalker_spawn_egg
      level: 1
      consume-spawn-egg: true
      entity-type: SPIDER
      display-name: "&5Shadow Stalker"
      health: 26
      damage: 6
      spawn-skills:
        - "skill{s=bullseye_shadow_stalker_idle} @self ~onSpawn"
      generated-skills:
        bullseye_shadow_stalker_idle:
          - "effect:particles{p=witch;amount=6;hS=0.2;vS=0.1} @self"
        bullseye_shadow_stalker_attack:
          - "effect:particles{p=smoke;amount=10;hS=0.25;vS=0.15} @self"
    toxic_crawler:
      mythic-mob: ToxicCrawler
      spawn-egg-item: toxic_crawler_spawn_egg
      level: 1
      consume-spawn-egg: true
      entity-type: CAVE_SPIDER
      display-name: "&2Toxic Crawler"
      health: 24
      damage: 5
      spawn-skills:
        - "skill{s=bullseye_toxic_crawler_idle} @self ~onSpawn"
      generated-skills:
        bullseye_toxic_crawler_idle:
          - "effect:particles{p=slime;amount=8;hS=0.2;vS=0.1} @self"
    inferno_brute:
      mythic-mob: InfernoBrute
      spawn-egg-item: inferno_brute_spawn_egg
      level: 1
      consume-spawn-egg: true
      entity-type: BLAZE
      display-name: "&6Inferno Brute"
      health: 34
      damage: 8
      spawn-skills:
        - "skill{s=bullseye_inferno_brute_idle} @self ~onSpawn"
      generated-skills:
        bullseye_inferno_brute_idle:
          - "effect:particles{p=flame;amount=12;hS=0.2;vS=0.2} @self"
    void_reaper:
      mythic-mob: VoidReaper
      spawn-egg-item: void_reaper_spawn_egg
