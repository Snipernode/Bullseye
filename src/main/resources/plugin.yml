name: Bullseye
main: tsd.beye.Bullseye
version: 1.0.0
api-version: '1.21'
author: Snipernode
description: Config-driven custom content engine for Paper/Folia servers.
website: https://example.com/bullseye
softdepend: [MythicMobs, ModelEngine, ModelEngineR4, PlaceholderAPI, TAB, WorldEdit, WorldGuard, MMOItems, Nexo, Oraxen, ChampionAllies]

commands:
  bullseye:
    description: Opens Bullseye main panel and provides admin subcommands.
    usage: /bullseye
    permission: bullseye.admin

permissions:
  bullseye.admin:
    description: Access Bullseye administration commands.
    default: op
